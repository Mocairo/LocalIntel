[app]
timezone = "Asia/Shanghai"
daily_time = "08:30"
days_back = 1
data_dir = "data"
report_dir = "reports"
log_dir = "logs"
interests_file = "interests.toml"
request_timeout_seconds = 30

[llm]
enabled = true
base_url_env = "MiMO_BASE_URL"
api_key_env = "MIMO_API_KEY"
fallback_base_url_env = "OPENAI_BASE_URL"
fallback_api_key_env = "OPENAI_API_KEY"
model = "mimo-v2.5-pro"
model_candidates = ["mimo-v2.5-pro", "mimo-v2.5", "mimo-v2-pro"]
max_items = 40
max_tokens = 8000
timeout_seconds = 120
temperature = 1.0
top_p = 0.95

[translation]
enabled = true
provider = "llm"
model = "mimo-v2.5-pro"
max_items = 20
batch_size = 4
timeout_seconds = 45
public_timeout_seconds = 3
public_max_failures = 2
public_max_seconds = 45

[web]
host = "127.0.0.1"
port = 8765

[hackernews]
enabled = true
limit = 25

[github]
enabled = true
limit = 10
trending_enabled = true
trending_since = "daily"
trending_languages = [""]
queries = [
  "stars:>20 created:>={since} topic:ai",
  "stars:>20 created:>={since} language:Python",
  "stars:>500 pushed:>={since} topic:developer-tools"
]
release_repos = [
  "microsoft/vscode",
  "langchain-ai/langchain",
  "langchain-ai/langgraph",
  "openai/openai-python",
  "microsoft/playwright",
  "pydantic/pydantic",
  "fastapi/fastapi",
  "astral-sh/uv"
]

[arxiv]
enabled = true
limit = 20
fallback_latest = true
delay_seconds = 3.2
categories = ["cs.AI", "cs.LG", "cs.CL", "cs.CV"]
keywords = ["LLM", "agent", "RAG", "reasoning", "coding", "multimodal", "vision", "robotics"]

[gdelt]
enabled = true
limit = 6
delay_seconds = 6.2
world_days_back = 3
theme_queries_per_run = 3
preferred_domains = ["reuters.com", "apnews.com", "bbc.com", "theguardian.com", "aljazeera.com", "npr.org", "dw.com", "news.un.org", "techcrunch.com", "mit.edu", "nature.com"]
queries = [
  "artificial intelligence",
  "global economy",
  "geopolitics"
]
theme_pool = [
  { theme = "AI政策", query = "artificial intelligence regulation" },
  { theme = "芯片产业", query = "semiconductor supply chain" },
  { theme = "科技监管", query = "technology regulation" },
  { theme = "能源气候", query = "energy transition climate" },
  { theme = "金融市场", query = "central bank inflation markets" },
  { theme = "地缘冲突", query = "geopolitical conflict" },
  { theme = "中美关系", query = "US China relations" },
  { theme = "供应链贸易", query = "trade supply chain" },
  { theme = "大公司动态", query = "big tech antitrust" },
]

[rss]
enabled = true
limit_per_feed = 6
feeds = [
  { name = "Python Insider", url = "https://blog.python.org/feeds/posts/default", category = "programming" },
  { name = "GitHub Blog", url = "https://github.blog/feed/", category = "programming" },
  { name = "Google Research", url = "https://research.google/blog/rss/", category = "ai" },
  { name = "OpenAI News", url = "https://openai.com/news/rss.xml", category = "ai" },
  { name = "Anthropic News", url = "https://www.anthropic.com/news/rss.xml", category = "ai" },
  { name = "MIT Technology Review", url = "https://www.technologyreview.com/feed/", category = "technology" },
  { name = "BBC World", url = "https://feeds.bbci.co.uk/news/world/rss.xml", category = "world_news", theme = "全球概览" },
  { name = "Guardian World", url = "https://www.theguardian.com/world/rss", category = "world_news", theme = "全球概览" },
  { name = "NPR World", url = "https://feeds.npr.org/1004/rss.xml", category = "world_news", theme = "全球概览" },
  { name = "Al Jazeera", url = "https://www.aljazeera.com/xml/rss/all.xml", category = "world_news", theme = "地缘冲突" },
  { name = "UN News", url = "https://news.un.org/feed/subscribe/en/news/all/rss.xml", category = "world_news", theme = "国际组织" },
  { name = "DW Top Stories", url = "https://rss.dw.com/xml/rss-en-all", category = "world_news", theme = "欧洲视角" }
]
